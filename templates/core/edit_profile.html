{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
    <div class="glass-card bg-white/40 dark:bg-darkCard/40 backdrop-blur-md rounded-3xl p-8 sm:p-10 shadow-2xl border border-slate-200/50 dark:border-darkBorder/50">
        <div class="mb-8">
            <h2 class="text-3xl font-bold font-display text-slate-900 dark:text-slate-100">Edit Profile</h2>
            <p class="mt-2 text-sm text-slate-500 dark:text-slate-400">Update your student information and department affiliation.</p>
        </div>
        
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-200">Department</label>
                <div class="relative">
                    <select name="department" class="w-full rounded-2xl border border-slate-300 dark:border-slate-700 bg-white/60 dark:bg-darkBg/60 backdrop-blur-sm px-4 py-3.5 text-sm text-slate-900 dark:text-slate-100 outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-500/20 appearance-none cursor-pointer" required>
                        <option value="" disabled>Select your department</option>
                        {% for dept in departments %}
                            <option value="{{ dept.id }}" {% if student.department.id == dept.id %}selected{% endif %}>{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
                <p class="text-xs text-slate-500 dark:text-slate-400">Selecting the correct department ensures you see relevant books and past papers.</p>
            </div>
            
            <div class="pt-4 border-t border-slate-200/50 dark:border-slate-700/50 flex items-center justify-end space-x-4">
                <a href="javascript:history.back()" class="px-5 py-2.5 text-sm font-semibold text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white transition-colors">Cancel</a>
                <button type="submit" class="inline-flex items-center justify-center rounded-2xl bg-sky-500 px-6 py-2.5 text-sm font-semibold text-white shadow-lg shadow-sky-500/20 transition hover:bg-sky-600 hover:-translate-y-0.5">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
