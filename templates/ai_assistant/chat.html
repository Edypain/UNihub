{% extends 'base.html' %}

{% block content %}
<div class="w-full h-[calc(100vh-200px)] flex flex-col bg-gray-50 dark:bg-darkBg rounded-xl shadow-lg border border-gray-200 dark:border-darkBorder overflow-hidden transition-colors duration-300">
    <!-- Header -->
    <div class="bg-white dark:bg-darkCard border-b border-gray-200 dark:border-darkBorder px-6 py-4 shadow-sm transition-colors duration-300">
        <div class="flex items-center justify-between flex-wrap gap-2">
            <div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white font-display">UniHub AI Assistant</h1>
                <p class="text-sm text-gray-600 dark:text-gray-400 mt-1">Ask me anything about your studies!</p>
            </div>
            <span class="text-xs bg-indigo-100 text-indigo-800 dark:bg-indigo-900/50 dark:text-indigo-300 px-3 py-1 rounded-full font-bold uppercase tracking-wider flex items-center gap-1 border border-indigo-200/50 dark:border-indigo-800/50">
                <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
                ✦ Powered by Edy AI
            </span>
        </div>
    </div>

    <!-- Chat Messages Container -->
    <div class="flex-1 overflow-y-auto p-4 space-y-4 scroll-smooth" id="chat-messages">
        <div class="text-center text-gray-500 dark:text-gray-400 text-sm py-8">
            <div class="inline-block p-4 bg-blue-50 dark:bg-blue-900/20 rounded-lg border border-blue-200 dark:border-blue-800">
                👋 Welcome! Ask me questions about your studies, assignments, or anything academic.
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="bg-white dark:bg-darkCard border-t border-gray-200 dark:border-darkBorder px-4 py-4 shadow-lg transition-colors duration-300 flex gap-2">
        <input 
            type="text" 
            id="message-input" 
            class="flex-1 px-4 py-3 rounded-lg border border-gray-300 dark:border-darkBorder bg-white dark:bg-darkBg text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:focus:ring-brand-500 transition-all duration-300" 
            placeholder="Type your question here..."
            autocomplete="off"
        >
        <button 
            id="send-btn" 
            class="px-6 py-3 bg-brand-500 dark:bg-brand-600 hover:bg-brand-600 dark:hover:bg-brand-700 text-white font-medium rounded-lg transition-all duration-300 flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed active:scale-95"
        >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
            <span class="hidden sm:inline">Send</span>
        </button>
    </div>
</div>

<!-- Markdown Parser Library -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
    const sendBtn = document.getElementById('send-btn');
    const messageInput = document.getElementById('message-input');
    const chatMessages = document.getElementById('chat-messages');

    // Clear initial message on first interaction
    let firstMessage = true;

    function clearInitialMessage() {
        if (firstMessage) {
            chatMessages.innerHTML = '';
            firstMessage = false;
        }
    }

    function addMessage(content, isUser) {
        clearInitialMessage();
        
        const div = document.createElement('div');
        div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} animate-fadeIn`;
        
        const bubble = document.createElement('div');
        
        if (isUser) {
            bubble.className = 'max-w-xs lg:max-w-md px-4 py-3 rounded-lg bg-brand-500 text-white rounded-br-none transition-colors duration-300 break-words whitespace-pre-wrap';
            bubble.textContent = content;
        } else {
            bubble.className = 'max-w-xs lg:max-w-md px-4 py-3 rounded-lg bg-gray-200 dark:bg-darkCard text-gray-900 dark:text-gray-100 rounded-bl-none border border-gray-300 dark:border-darkBorder transition-colors duration-300 break-words prose prose-sm dark:prose-invert max-w-none';
            
            // Parse markdown to HTML for assistant messages
            try {
                const htmlContent = marked.parse(content);
                bubble.innerHTML = htmlContent;
            } catch (e) {
                bubble.textContent = content;
            }
        }
        
        div.appendChild(bubble);
        chatMessages.appendChild(div);
        
        // Scroll to bottom
        setTimeout(() => {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }, 0);
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    async function sendMessage() {
        const prompt = messageInput.value.trim();
        if (!prompt || sendBtn.disabled) return;

        // Add user message
        addMessage(prompt, true);
        messageInput.value = '';

        // Show loading indicator
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'flex justify-start';
        loadingDiv.id = 'loading';
        const loadingBubble = document.createElement('div');
        loadingBubble.className = 'bg-gray-200 dark:bg-darkCard text-gray-900 dark:text-gray-100 px-4 py-3 rounded-lg rounded-bl-none border border-gray-300 dark:border-darkBorder transition-colors duration-300';
        loadingBubble.innerHTML = '<div class="flex items-center gap-2"><div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce"></div><div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></div><div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div></div>';
        loadingDiv.appendChild(loadingBubble);
        chatMessages.appendChild(loadingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        // Disable input
        sendBtn.disabled = true;
        messageInput.disabled = true;

        try {
            const response = await fetch('/ai/query/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });
            const data = await response.json();
            
            const loading = document.getElementById('loading');
            if (loading) loading.remove();

            if (data.answer) {
                addMessage(data.answer, false);
            } else if (data.error) {
                // Check if it's a service unavailability error
                if (data.error.includes('high demand')) {
                    addMessage('⏳ ' + data.error + '\n\nTip: Try asking again in a few moments!', false);
                } else if (data.error.includes('Rate limit')) {
                    addMessage('⏱️ ' + data.error + '\n\nPlease wait a moment before your next message.', false);
                } else {
                    addMessage('❌ ' + data.error, false);
                }
            } else {
                addMessage('❌ Sorry, I encountered an error. Please try again.', false);
            }
        } catch (err) {
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
            addMessage('❌ Network error. Please check your connection and try again.', false);
        } finally {
            // Re-enable input
            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }
    }

    // Focus input on page load
    messageInput.focus();
</script>

<style>
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .animate-fadeIn {
        animation: fadeIn 0.3s ease-out;
    }

    #chat-messages {
        scrollbar-width: thin;
        scrollbar-color: #cbd5e1 transparent;
    }

    .dark #chat-messages {
        scrollbar-color: #1f293d transparent;
    }

    /* Markdown styling */
    .prose {
        font-size: inherit;
        line-height: 1.6;
    }

    .prose h1,
    .prose h2,
    .prose h3,
    .prose h4,
    .prose h5,
    .prose h6 {
        margin-top: 0.75rem;
        margin-bottom: 0.5rem;
        font-weight: 600;
        line-height: 1.3;
    }

    .prose h1 {
        font-size: 1.25rem;
    }

    .prose h2 {
        font-size: 1.1rem;
    }

    .prose h3 {
        font-size: 1rem;
    }

    .prose h4,
    .prose h5,
    .prose h6 {
        font-size: 0.95rem;
    }

    .prose p {
        margin: 0.5rem 0;
    }

    .prose ul,
    .prose ol {
        margin: 0.5rem 0;
        padding-left: 1.5rem;
    }

    .prose li {
        margin: 0.25rem 0;
    }

    .prose code {
        background-color: rgba(0, 0, 0, 0.1);
        padding: 0.2rem 0.4rem;
        border-radius: 0.25rem;
        font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        font-size: 0.9em;
    }

    .dark .prose code {
        background-color: rgba(255, 255, 255, 0.1);
    }

    .prose pre {
        background-color: rgba(0, 0, 0, 0.05);
        padding: 0.75rem;
        border-radius: 0.5rem;
        overflow-x: auto;
        margin: 0.5rem 0;
    }

    .dark .prose pre {
        background-color: rgba(0, 0, 0, 0.3);
    }

    .prose pre code {
        background-color: transparent;
        padding: 0;
        color: inherit;
    }

    .prose blockquote {
        border-left: 3px solid #cbd5e1;
        padding-left: 0.75rem;
        margin: 0.5rem 0;
        font-style: italic;
        opacity: 0.8;
    }

    .dark .prose blockquote {
        border-left-color: #1f293d;
    }

    .prose a {
        color: #0284c7;
        text-decoration: underline;
    }

    .dark .prose a {
        color: #38bdf8;
    }

    .prose strong {
        font-weight: 600;
    }

    .prose em {
        font-style: italic;
    }

    .prose hr {
        border: none;
        border-top: 1px solid #cbd5e1;
        margin: 0.75rem 0;
    }

    .dark .prose hr {
        border-top-color: #1f293d;
    }
</style>
{% endblock %}
